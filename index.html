<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>DNA 分子可视化</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at top, #171a22 0%, #090c14 50%, #020308 100%); color: #e5e7eb; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        #info {
            position: absolute;
            left: 24px;
            top: 18px;
            max-width: 280px;
            font-size: 11px;
            line-height: 1.65;
            color: rgba(229,231,235,0.68);
            text-shadow: 0 0 10px rgba(0,0,0,0.22);
            pointer-events: none;
        }
        #info strong { color: #e5f0ff; }
        #card {
            position: absolute;
            right: 22px;
            top: 22px;
            width: 280px;
            padding: 22px;
            border-radius: 20px;
            background: rgba(10,11,16,0.92);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 90px rgba(0,0,0,0.5);
            backdrop-filter: blur(18px);
            display: none;
            z-index: 5;
        }
        #card h3 {
            margin: 0 0 10px;
            font-size: 16px;
            letter-spacing: 0.02em;
        }
        #card p {
            margin: 0;
            font-size: 13px;
            color: rgba(236,239,244,0.82);
            line-height: 1.65;
        }
        #card small {
            display: block;
            margin-top: 14px;
            font-size: 11px;
            opacity: 0.7;
            color: #99a4b5;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>DNA数字孪生结构模型</strong><br>
        鼠标拖动旋转 · 滚轮缩放 · 点击节点查看<br>
        颜色与形状对应：A / T / C / G、磷酸基团、磷酸二酯键、糖环。
    </div>
    <div id="card">
        <h3 id="c-title">结构信息</h3>
        <p id="c-desc">点击分子结构中的任意碱基或键，查看它的教科书级介绍。</p>
        <small id="c-note">点击背景任意位置可关闭。</small>
    </div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
